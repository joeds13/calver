[tools]
fnox = "latest"
prek = "latest"
rust = "stable"

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[env]
_.fnox-env = { tools = true }

# Dev environment for working on annover itself.
# To install annover *into your project*, see the usage section below.

[tasks.build]
run = "cargo build"

[tasks.test]
run = "cargo test"

[tasks.release]
run = "cargo build --release"

[tasks."release:run"]
run = "./target/release/annover"
depends = ["release"]

[tasks.lint]
run = "cargo clippy -- -D warnings"

[tasks.fmt]
run = "cargo fmt"

[tasks."prek"]
run = "prek run --all-files"

[tasks.check]
run = "prek run --all-files"

[tasks.actions-up]
run = "npx -y actions-up -y"

# ── Installing annover in your project ────────────────────────────────────────
#
# Option 1 — cargo (from crates.io once published):
#   [tools]
#   "cargo:annover" = "latest"
#
# Option 2 — github (GitHub releases binary, fastest):
#   [tools]
#   "github:joeds13/annover" = "latest"
#
# Option 3 — local cargo install during development:
#   [tools]
#   "cargo:annover" = { path = "/path/to/annover" }
