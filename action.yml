name: "annover"
description: "AnnoVer versioning — bump releases or update image tags in a gitops repository"
author: "joe@stringer.sh"

branding:
  icon: "tag"
  color: "green"

inputs:
  # ── Deploy mode (triggered when 'image' is set) ───────────────────────────
  repository:
    description: >
      GitOps repository to update (owner/repo).
      When set alongside 'image', the action runs in deploy mode:
      it checks out this repo, updates the image tag, commits, and pushes.
    required: false
    default: ""

  token:
    description: >
      GitHub token. In bump mode this is used to push tags and create releases
      (defaults to the built-in GITHUB_TOKEN). In deploy mode this must be a
      PAT with write access to the gitops repository.
    required: false
    default: ${{ github.token }}

  image:
    description: >
      Container image name to update in the gitops repo (e.g. ghcr.io/owner/app).
      Setting this input activates deploy mode.
    required: false
    default: ""

  tag:
    description: "New image tag to deploy (e.g. 2026.4)."
    required: false
    default: ""

  path:
    description: >
      Local directory name to check the gitops repo out into.
      Only used in deploy mode.
    required: false
    default: "_annover_gitops"

  file:
    description: >
      Specific file (relative to the gitops repo root) to update.
      When omitted, annover searches all YAML files for the image reference.
    required: false
    default: ""

  # ── Bump mode ─────────────────────────────────────────────────────────────
  no-release:
    description: "Skip creating a GitHub release (bump mode only)."
    required: false
    default: "false"

  dry-run:
    description: "Print what would happen without making any changes."
    required: false
    default: "false"

  version:
    description: 'annover CLI version to install. Defaults to "latest".'
    required: false
    default: "latest"

outputs:
  version:
    description: >
      In bump mode: the version that was created.
      In deploy mode: the tag that was deployed.
    value: ${{ steps.output.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Install annover
      shell: bash
      env:
        ANNOVER_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        REPO="joeds13/annover"
        if [ "${ANNOVER_VERSION}" = "latest" ]; then
          ANNOVER_VERSION=$(gh release view --repo "${REPO}" --json tagName -q .tagName)
        fi
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "${ARCH}" in
          x86_64)        ARCH="x86_64" ;;
          aarch64|arm64) ARCH="aarch64" ;;
          *) echo "Unsupported architecture: ${ARCH}"; exit 1 ;;
        esac
        case "${OS}" in
          linux)  TARGET="${ARCH}-unknown-linux-musl" ;;
          darwin) TARGET="${ARCH}-apple-darwin" ;;
          *) echo "Unsupported OS: ${OS}"; exit 1 ;;
        esac
        ARCHIVE="annover-${ANNOVER_VERSION}-${TARGET}.tar.gz"
        URL="https://github.com/${REPO}/releases/download/${ANNOVER_VERSION}/${ARCHIVE}"
        curl -fsSL "${URL}" | tar -xz -C /usr/local/bin annover
        chmod +x /usr/local/bin/annover
        annover --version

    # ── Deploy mode ───────────────────────────────────────────────────────────

    - name: Checkout gitops repo
      if: ${{ inputs.image != '' }}
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: ${{ inputs.repository }}
        token: ${{ inputs.token }}
        path: ${{ inputs.path }}

    - name: Configure git identity (deploy)
      if: ${{ inputs.image != '' }}
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run annover deploy
      if: ${{ inputs.image != '' }}
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        ARGS="--image ${{ inputs.image }} --tag ${{ inputs.tag }}"
        [ -n "${{ inputs.file }}" ] && ARGS="${ARGS} --file ${{ inputs.file }}"
        [ "${{ inputs.dry-run }}" = "true" ] && ARGS="${ARGS} --dry-run"
        annover deploy ${ARGS}

    # ── Bump mode ─────────────────────────────────────────────────────────────

    - name: Configure git identity (bump)
      if: ${{ inputs.image == '' }}
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run annover bump
      if: ${{ inputs.image == '' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        ARGS=""
        [ "${{ inputs.no-release }}" = "true" ] && ARGS="${ARGS} --no-release"
        [ "${{ inputs.dry-run }}"   = "true" ] && ARGS="${ARGS} --dry-run"
        annover bump ${ARGS}

    # ── Output ────────────────────────────────────────────────────────────────

    - name: Set output version
      id: output
      shell: bash
      run: |
        if [ -n "${{ inputs.image }}" ]; then
          echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
        else
          echo "version=$(annover current)" >> "$GITHUB_OUTPUT"
        fi
